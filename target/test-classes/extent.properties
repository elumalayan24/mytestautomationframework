# ExtentReports Configuration
# Base directory for report generation
basefolder.name=test-output/

# Spark reporter settings
extent.reporter.spark.start=true
extent.reporter.spark.out=test-output/ExtentReport.html
extent.reporter.spark.config=src/test/resources/extent-config.xml

# Screenshot settings
extent.reporter.spark.screenshot.dir=screenshots/
extent.reporter.spark.screenshot.rel.path=../screenshots/
extent.reporter.spark.screenshot.fail=true
extent.reporter.spark.screenshot.pass=false
extent.reporter.spark.screenshot.skip=false

# Document settings
extent.reporter.spark.documentTitle=Test Automation Report
extent.reporter.spark.reportName=Test Execution Report
extent.reporter.spark.reportHeadline=Test Automation Report

# Enable/disable timeline on dashboard
extent.reporter.spark.timeline.enabled=true

# Timezone for the report
extent.reporter.spark.timezone=UTC

# Date format for the report
extent.reporter.spark.dateFormat=MMM dd, yyyy HH:mm:ss
