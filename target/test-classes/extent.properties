# ExtentReports Configuration for Cucumber
extent.reporter.spark.start=true
extent.reporter.spark.out=test-output/ExtentReport.html

# Report Configuration
extent.reporter.spark.config=src/test/resources/extent-config.xml

# Base64 Screenshot Encoding (set to false for file paths)
screenshot.dir=test-output/screenshots
screenshot.rel.path=screenshots/

# System Information
systeminfo.os=Windows 11
systeminfo.user=Test User
systeminfo.environment=QA

# Test Suite ID (will be generated at runtime)
systeminfo.testsuite.id=TS_AUTO_GENERATED

# Enable/Disable features
extent.reporter.spark.vieworder=dashboard,test,category,exception,log

# Theme: standard or dark
extent.reporter.spark.theme=standard