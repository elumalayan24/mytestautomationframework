# PostgreSQL Database Configuration

# PostgreSQL Connection Settings
database.url=jdbc:postgresql://localhost:5432/test_automation
database.username=postgres
database.password=admin

# Connection Pool Settings
database.pool.maxSize=10
database.pool.minIdle=2
database.pool.idleTimeout=300000
database.pool.connectionTimeout=20000
database.pool.maxLifetime=1200000

# Database Settings
database.autoCreateTables=true
database.logSql=false

# IMPORTANT: 
# 1. Create database in PostgreSQL: CREATE DATABASE test_automation;
# 2. Update username and password above
# 3. Ensure PostgreSQL is running on localhost:5432
