# Base configuration for the automation framework

# Application URL
base.url=https://example.com

# Test environment (dev/staging/prod)
environment=staging

# Browser configuration
browser.type=chrome
headless=false
window.width=1920
window.height=1080

# Timeouts (in seconds)
timeout.implicit=10
timeout.explicit=10
timeout.pageLoad=30

# Test data
test.data.path=src/test/resources/testdata/

# Reports and screenshots
reports.dir=test-results/reports/
screenshots.dir=test-results/screenshots/

# Framework settings
automation.type=selenium  # selenium or playwright
retry.failed.tests=true
max.retry.count=2
